<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>宫格记事本</title>
    <link rel="stylesheet" href="./css/index.css" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
  </head>
  <body>
    <div class="app">
      <!-- 侧边栏 / 顶部栏 -->
      <aside class="sidebar">
        <header class="sidebar__header">
          <div class="sidebar__logo">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="7" height="7" rx="1.5"/>
              <rect x="14" y="3" width="7" height="7" rx="1.5"/>
              <rect x="3" y="14" width="7" height="7" rx="1.5"/>
              <rect x="14" y="14" width="7" height="7" rx="1.5"/>
            </svg>
            <span>宫格记事本</span>
          </div>
          <div class="sidebar__actions">
            <button class="icon-btn icon-btn--accent" id="add-panel-btn" title="新建面板" aria-label="新建面板">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"/>
                <line x1="5" y1="12" x2="19" y2="12"/>
              </svg>
            </button>
            <button class="icon-btn" id="global-setting-btn" title="全局设置" aria-label="全局设置">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"/>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
              </svg>
            </button>
          </div>
        </header>

        <!-- 隐私锁进度条 -->
        <div class="lock-bar" id="lock-bar">
          <div class="lock-bar__fill" id="lock-bar-fill"></div>
        </div>

        <!-- 面板列表（由 JS 渲染） -->
        <nav class="sidebar__nav" id="nav-content"></nav>

        <footer class="sidebar__footer">
          <div>存储：<span class="current-cache">0</span> / 5MB</div>
          <div>
            <a href="https://github.com/Littlefean/LittleText" target="_blank" rel="noopener">GitHub</a>
            <a href="https://www.bilibili.com/video/BV1Hx4y1Z7ud" target="_blank" rel="noopener">Bilibili</a>
          </div>
        </footer>
      </aside>

      <!-- 主工作区 -->
      <main class="workspace grid" id="workspace"></main>
    </div>

    <!-- 新建面板模态层 -->
    <div class="modal-overlay" id="add-panel">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="add-panel-title">
        <div class="modal__header">
          <h2 class="modal__title" id="add-panel-title">新建面板</h2>
          <button class="icon-btn" data-modal-close aria-label="关闭">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <div class="modal__body">
          <div class="field">
            <label class="field__label" for="panel-type">面板类型</label>
            <select class="select" id="panel-type"></select>
          </div>
          <div class="field">
            <label class="field__label" for="panel-name">面板命名</label>
            <input class="input" id="panel-name" type="text" placeholder="给面板起个名字…" />
          </div>
        </div>
        <div class="modal__footer">
          <button class="btn btn--ghost" data-modal-close>取消</button>
          <button class="btn btn--primary" id="panel-create">创建</button>
        </div>
      </div>
    </div>

    <!-- 全局设置模态层 -->
    <div class="modal-overlay" id="global-settings-panel">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="settings-title">
        <div class="modal__header">
          <h2 class="modal__title" id="settings-title">全局设置</h2>
          <button class="icon-btn" data-modal-close aria-label="关闭">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <div class="modal__body">
          <section class="field">
            <span class="field__label">数据安全</span>
            <div style="display:flex; gap:12px;">
              <button class="btn btn--ghost" id="export-btn">导出记录</button>
              <button class="btn btn--ghost" id="import-btn">导入记录</button>
            </div>
            <input type="file" id="import-file-input" accept="application/json,.json" hidden />
          </section>
          <section class="field">
            <div style="display:flex; align-items:center; justify-content:space-between;">
              <div>
                <div class="field__label">隐私锁保护</div>
                <div style="font-size:12px; color:var(--text-muted);">开启后进入即保护状态，仅显示 default，Ctrl/⌘+Q 解除</div>
              </div>
              <button class="btn btn--ghost" id="lock-switch">当前：<span id="lock-state">关闭</span></button>
            </div>
          </section>

          <section class="field">
            <span class="field__label">云同步</span>
            <div class="sync-hint">在云端保留一份数据副本（单人使用，覆盖式保存）</div>
            <div class="field">
              <label class="field__label" for="sync-url">同步地址</label>
              <input class="input" id="sync-url" type="text" placeholder="https://dancehole.cn/api/littletext/sync" />
            </div>
            <div class="field">
              <label class="field__label" for="sync-token">同步令牌</label>
              <input class="input" id="sync-token" type="password" placeholder="自定义一段密钥，前后端需一致" autocomplete="off" />
            </div>
            <div style="display:flex; align-items:center; justify-content:space-between; gap:12px;">
              <span style="font-size:13px; color:var(--text-secondary);">编辑后自动同步到云端</span>
              <button class="btn btn--ghost" id="sync-auto">当前：<span id="sync-auto-state">关闭</span></button>
            </div>
            <div class="sync-actions">
              <button class="btn btn--ghost" id="sync-push">上传到云端</button>
              <button class="btn btn--ghost" id="sync-pull">从云端下载</button>
            </div>
            <div class="sync-status" id="sync-status"></div>
          </section>
        </div>
        <div class="modal__footer">
          <button class="btn btn--primary" data-modal-close>完成</button>
        </div>
      </div>
    </div>

    <!-- Toast 容器 -->
    <div class="toast-stack" id="toast-stack" aria-live="polite"></div>

    <script src="js/tools/utils.js"></script>
    <script src="js/systems/jsonStorage.js"></script>
    <script src="js/systems/markdown.js"></script>
    <script src="js/service/globalData.js"></script>
    <script src="js/core/eventBus.js"></script>
    <script src="js/components/toast.js"></script>
    <script src="js/components/modal.js"></script>
    <script src="js/components/contextMenu.js"></script>
    <script src="js/components/NAV_LIST.js"></script>
    <script src="js/components/dialogAddPanel.js"></script>
    <script src="js/systems/cloudSync.js"></script>
    <script src="js/components/dialogGlobalSettingPanel.js"></script>
    <script src="js/components/componentTextareaContainer.js"></script>
    <script src="js/index.js"></script>
  </body>
</html>
